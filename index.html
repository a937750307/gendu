<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跟读提词器</title>
<link rel="stylesheet" href="styles.css">
<style>
  .beian-bar{width:100%;background:transparent;padding:12px 0;text-align:center;font-size:14px;line-height:1.6;border-top:1px solid transparent}
  .beian-pc{display:flex;justify-content:center;align-items:center;gap:20px}
  .beian-disclaimer{color:#e74c3c;white-space:nowrap}
  .beian-icp{color:#333;text-decoration:none;white-space:nowrap}
  .beian-gongan{display:inline-flex;align-items:center;gap:6px;color:#333;text-decoration:none;white-space:nowrap}
  .beian-gongan img{width:16px;height:16px}
  @media(max-width:768px){.beian-pc{display:none}.beian-mobile{display:flex;flex-direction:column;align-items:center;gap:6px}.beian-mobile a,.beian-mobile span{display:block;line-height:1.8}}
  @media(min-width:769px){.beian-mobile{display:none}}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-toolbar">
      <button id="btnHelp" title="查看使用说明" onclick="window.open('README.html', '_blank')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zm0 1a5 6.5 0 110 10A5 6.5 0 018 3zm.5 2.5v4h-1v-4h1zm0 5v1h-1v-1h1z"/></svg>
        使用说明
      </button>
      <button id="btnNightMode" title="切换到夜间模式">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 106 6 6.5 6.5 0 01-6-6z"/></svg>
        夜间
      </button>
    </div>
    <h1>跟读提词器</h1>
    <!-- 忆痕发布页 www.937788.xyz -->
    <p>引导式跟读 - 逐行领读，逐句跟读</p>
  </div>

  <!-- Status text -->
  <div class="status-text" id="statusText">点击播放开始跟读</div>

  <!-- Rows container -->
  <div class="rows-container" id="rowsContainer">
    <!-- Rows rendered dynamically -->
  </div>
  <button class="add-row" id="addRowBtn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    添加新行
  </button>

  <!-- Global controls -->
  <div class="global-controls">
    <div class="speed-control">
      <span>语速</span>
      <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
      <span class="speed-label" id="speedLabel">1.0x</span>
    </div>

  </div>

  <div class="global-controls">
    <div class="pre-countdown-wrap">
      <span>播放前倒计时</span>
      <input type="number" id="preCountdownInput" class="global-pause-input" value="0" min="0" max="10" step="1">
      <span>s</span>
    </div>

    <div class="control-group">
      <label class="toggle-control">
        <input type="checkbox" id="globalPauseToggle">
        <span class="toggle-switch"></span>
        <span>全局停顿</span>
      </label>
      <div class="global-pause-input-wrap">
        <input type="number" id="globalPauseSeconds" class="global-pause-input" value="5" min="0" step="1">
        <span>s</span>
      </div>
    </div>

    <div class="control-group">
      <label class="toggle-control">
        <input type="checkbox" id="smartPauseToggle">
        <span class="toggle-switch"></span>
        <span>智能停顿</span>
      </label>

      <label class="toggle-control">
        <input type="checkbox" id="charHighlightToggle" checked>
        <span class="toggle-switch"></span>
        <span>逐字高亮</span>
      </label>
    </div>
  </div>

  <!-- Tool buttons -->
  <div class="tool-buttons">
    <button class="btn" id="btnImport">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7 10V2h2v8h3l-4 4-4-4h3zM2 14h12v1H2v-1z"/></svg>
      导入
    </button>
    <button class="btn" id="btnExport">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2l4 4h-3v6H7V6H4l4-4zM2 14h12v1H2v-1z"/></svg>
      导出
    </button>
    <button class="btn" id="btnPrint">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="5" width="10" height="7" rx="1"/><path d="M4 2h8v3H4V2zM3 13h10v1H3v-1z"/></svg>
      打印排版
    </button>
  </div>

  <!-- Playback controls -->
  <div class="playback-controls">
    <button class="btn primary" id="btnPlay" title="从头开始播放">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
      从头开始
    </button>
    <button class="btn btn-icon" id="btnPause" title="暂停" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="3" width="3" height="10" rx="0.5"/><rect x="9" y="3" width="3" height="10" rx="0.5"/></svg>
    </button>
    <button class="btn btn-icon" id="btnStop" title="停止" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3.5" y="3.5" width="9" height="9" rx="1"/></svg>
    </button>
    <button class="btn btn-icon" id="btnPrev" title="上一句" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M12 4v8l-5-4 5-4zM4 4v8H3V4h1z"/></svg>
    </button>
    <button class="btn btn-icon" id="btnNext" title="下一句" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4v8l5-4-5-4zm8 0v8h1V4h-1z"/></svg>
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-info">
      <span id="progressLabel">0 / 0 句</span>
    </div>
  </div>

  <div class="beian-bar">
    <div class="beian-pc">
      <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
      <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
        <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
        浙公网安备33030402001483号
      </a>
    </div>
    <div class="beian-mobile">
      <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
      <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
        <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
        浙公网安备33030402001483号
      </a>
    </div>
  </div>
</div>

<!-- JS dependencies in load order -->
<script src="storage.js"></script>
<script src="tts.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
